name: "Deploy to GitHub Pages"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          # Copy all top-level files (HTML, assets, robots, etc.)
          # Exclude meta directories so GitHub Pages stays clean.
          rsync -av --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          # GitHub Pages needs lowercase index.html as the default doc.
          if [ -f "_site/Index.html" ] && [ ! -f "_site/index.html" ]; then
            cp _site/Index.html _site/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
