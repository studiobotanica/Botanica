name: "HTML Validate & Lint"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm i -g html-validate@9

      - name: Run html-validate
        run: |
          html-validate --formatter=stylish '*.html' || exit_code=$?
          # Soft-fail on warnings only; hard-fail on real errors handled by the tool
          exit ${exit_code:-0}
